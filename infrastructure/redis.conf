# IQF Redis config — optimized for pub/sub + ephemeral agent state
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence — RDB snapshots only (no AOF for this use case)
save 900 1
save 300 10
save 60 10000

dbfilename dump.rdb
dir /data

# Security
protected-mode yes
bind 0.0.0.0

# Pub/sub
notify-keyspace-events ""

# Performance
tcp-keepalive 300
timeout 0
hz 15
