name: Backfill Results

on:
  # Auto-run during IST market hours when BSE feed is live (Mon-Fri)
  # 05:00 UTC = 10:30 AM IST  |  08:30 UTC = 2:00 PM IST
  schedule:
    - cron: '0 5 * * 1-5'    # 10:30 AM IST — morning session
    - cron: '30 8 * * 1-5'   # 2:00 PM IST  — after-lunch session

  workflow_dispatch:
    inputs:
      from_date:
        description: "Start date (YYYY-MM-DD)"
        required: false
        default: "2026-05-01"
      to_date:
        description: "End date (YYYY-MM-DD, leave blank for today)"
        required: false
        default: ""
      max_process:
        description: "Max filings to process this run (100 = ~2.5 hrs)"
        required: false
        default: "100"
      seed_universe:
        description: "Seed Universe watchlist from full_universe.py? (true/false)"
        required: false
        default: "false"
      week_chunk_days:
        description: "Days per BSE API chunk (7 = weekly, 3 = finer)"
        required: false
        default: "7"
      use_yfinance:
        description: "Skip NSE/BSE PDF parsing — pull numbers directly from yfinance (true/false). No LLM needed."
        required: false
        default: "false"

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 3 hrs for large historical runs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install yfinance pdfminer.six requests

      # ── Universe seed (manual dispatch only) ──────────────────────────────────
      - name: Seed Universe Watchlist
        if: ${{ github.event.inputs.seed_universe == 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/seed_universe_watchlist.py

      # ── Historical results backfill ────────────────────────────────────────────
      # For scheduled runs: FROM_DATE/TO_DATE/MAX_PROCESS env vars are not set,
      # so backfill_results.py falls back to its built-in defaults:
      #   FROM_DATE  = 2026-05-01
      #   TO_DATE    = today
      #   MAX_PROCESS = 100
      - name: Run Backfill
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          NVIDIA_API_KEY:     ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL:       ${{ secrets.NVIDIA_MODEL }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL:         ${{ secrets.GROQ_MODEL }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:       ${{ secrets.GEMINI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FROM_DATE:          ${{ github.event.inputs.from_date || '' }}
          TO_DATE:            ${{ github.event.inputs.to_date || '' }}
          MAX_PROCESS:        ${{ github.event.inputs.max_process || '' }}
          WEEK_CHUNK_DAYS:    ${{ github.event.inputs.week_chunk_days || '' }}
          USE_YFINANCE:       ${{ github.event.inputs.use_yfinance || '' }}
        run: python scripts/backfill_results.py
