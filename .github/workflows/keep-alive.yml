name: Keep HF Space alive

on:
  schedule:
    # Ping every 20 hours — well under the 48h sleep threshold
    - cron: "0 */20 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          curl -sf "${{ secrets.HF_SPACE_URL }}/health" && echo "✓ Space is alive" || echo "⚠ Space unreachable"
