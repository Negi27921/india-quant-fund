name: Daily Report (10 PM IST)

on:
  schedule:
    # 10:00 PM IST = 16:30 UTC  Mon–Fri
    - cron: "30 16 * * 1-5"
  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-report-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-report-

      - name: Install dependencies
        run: pip install yfinance pandas supabase loguru groq

      - name: Fetch FII/DII data from NSE → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/update_fii_dii.py

      - name: Run strategy agent + daily report
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL:         ${{ secrets.REPORT_EMAIL }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/daily_report.py
