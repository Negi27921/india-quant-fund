name: Paper Trading Agent

on:
  schedule:
    # 11:00 AM IST = 05:30 UTC  Mon–Fri  (open new trades — AFTER screener runs at 10:30 AM)
    - cron: "30 5 * * 1-5"
    # 3:15 PM IST = 09:45 UTC  Mon–Fri  (check exits before market close)
    - cron: "45 9 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: open | check | both"
        required: false
        default: "both"

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-paper-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-pip-paper-

      - name: Install dependencies
        run: pip install yfinance pandas supabase loguru

      - name: Determine mode from cron time
        id: mode
        run: |
          HOUR=$(date -u +%H)
          # 05:30 UTC = open, 09:45 UTC = check
          if [ "$HOUR" -le "7" ]; then
            echo "mode=open" >> $GITHUB_OUTPUT
          else
            echo "mode=check" >> $GITHUB_OUTPUT
          fi

      - name: Run paper trader
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_CONFIDENCE:     "70"
          TRADE_AMOUNT:       "25000"
          MAX_OPEN_TRADES:    "30"
          KILL_DRAWDOWN:      "15"
        run: |
          MODE="${{ github.event.inputs.mode || steps.mode.outputs.mode }}"
          echo "Running paper trader in mode: $MODE"
          python scripts/paper_trader.py --$MODE
