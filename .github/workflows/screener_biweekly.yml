name: Screener.in Tiered Refresh

on:
  schedule:
    # Top 200 (large caps): daily at 23:30 UTC = 5:00 AM IST (pre-market)
    - cron: "30 23 * * 1-5"
    # Midcap (201-1000): every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
    # Smallcap (1001+): 1st and 15th of each month at 03:00 UTC
    - cron: "0 3 1,15 * *"
  workflow_dispatch:
    inputs:
      tier:
        description: "Refresh tier"
        type: choice
        options: [top200, midcap, smallcap, all]
        default: top200
      priority_only:
        description: "Only re-scrape LLM-flagged priority stocks"
        type: boolean
        default: false
      reset:
        description: "Re-scrape ALL stocks in tier (ignore staleness)"
        type: boolean
        default: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # full 5k run takes ~2.3h

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-screener-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-screener-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect tier from schedule
        id: tier
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tier=${{ github.event.inputs.tier || 'top200' }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            DOM=$(date -u +%d)
            DOW=$(date -u +%u)  # 1=Mon
            if [ "$DOW" = "1" ] && [ "$HOUR" = "02" ]; then
              echo "tier=midcap" >> $GITHUB_OUTPUT
            elif [ "$DOM" = "01" ] || [ "$DOM" = "15" ]; then
              echo "tier=smallcap" >> $GITHUB_OUTPUT
            else
              echo "tier=top200" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run LLM-guided tiered screener refresh
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TIER="${{ steps.tier.outputs.tier }}"
          PRIORITY_FLAG="${{ github.event.inputs.priority_only == 'true' && '--priority-only' || '' }}"
          RESET_FLAG="${{ github.event.inputs.reset == 'true' && '--reset' || '' }}"
          echo "Running tier=$TIER"
          python3 scripts/screener_refresh.py --tier "$TIER" $PRIORITY_FLAG $RESET_FLAG

      - name: Sync universe (expand dim_company)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          from dotenv import load_dotenv; load_dotenv()
          from supabase import create_client

          url = os.getenv("SUPABASE_URL","").strip().rstrip("/")
          key = os.getenv("SUPABASE_SERVICE_KEY","").strip()
          sb  = create_client(url, key)

          scr = sb.table("fact_screener_fundamentals").select("ticker,market_cap_cr,current_price").execute().data or []
          dim = sb.table("dim_company").select("ticker").execute().data or []
          existing = {r["ticker"] for r in dim if r.get("ticker")}
          scr_map  = {r["ticker"]: r for r in scr}

          new_rows = [
            {"company_id": t, "ticker": t, "company_name": t,
             "market_cap_inr_cr": scr_map[t].get("market_cap_cr"),
             "current_price_inr": scr_map[t].get("current_price"), "source": "screener"}
            for t in sorted(set(scr_map) - existing)
          ]
          if not new_rows:
              print("Universe already complete.")
          else:
              for i in range(0, len(new_rows), 200):
                  sb.table("dim_company").upsert(new_rows[i:i+200], on_conflict="company_id", ignore_duplicates=True).execute()
              print(f"Universe expanded by {len(new_rows)} stocks.")
          EOF
