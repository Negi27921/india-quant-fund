name: Monthly Report & Data Cleanup

on:
  schedule:
    # 1st of every month at 8:30 AM IST (3:00 AM UTC)
    - cron: "0 3 1 * *"
  workflow_dispatch:  # allow manual trigger

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase pandas loguru

      - name: Run monthly report & cleanup
        env:
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
          SMTP_USER:      ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:  ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST:      smtp.gmail.com
          SMTP_PORT:      "587"
          REPORT_EMAIL:   ${{ secrets.REPORT_EMAIL }}
          RETENTION_DAYS: "90"
        run: python scripts/monthly_report.py
