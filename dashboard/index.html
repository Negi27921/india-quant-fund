<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta id="theme-meta" name="theme-color" content="#0a0a0f" />
    <meta name="description" content="One Piece Quant — Automated NSE/BSE trading terminal with AI screeners" />
    <title>Luffy Labs | One Piece Quant Terminal</title>
    <script>
      (function () {
        try {
          // Migrate legacy theme key
          if (!localStorage.getItem('op-theme') && localStorage.getItem('iqf-theme')) {
            localStorage.setItem('op-theme', localStorage.getItem('iqf-theme'));
            localStorage.removeItem('iqf-theme');
          }
          var saved = localStorage.getItem('op-theme');
          var theme = saved || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          var meta = document.getElementById('theme-meta');
          if (meta) meta.content = theme === 'dark' ? '#0a0a0f' : '#F8F9FC';
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
